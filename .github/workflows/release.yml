name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.1)'
        required: true
        type: string

permissions:
  contents: read   # global default — jobs that need write declare it locally

env:
  CARGO_TERM_COLOR: always

jobs:
  # Validate tag matches version
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Validate tag matches version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          EXPECTED_TAG="v$VERSION"
          if [ "$TAG" != "$EXPECTED_TAG" ]; then
            echo "Error: Tag '$TAG' does not match Cargo.toml version '$VERSION'"
            echo "Expected tag: $EXPECTED_TAG"
            exit 1
          fi

      - name: Validate version consistency
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          PY_VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "$PY_VERSION" ]; then
            echo "Error: Cargo.toml ($CARGO_VERSION) and pyproject.toml ($PY_VERSION) versions don't match"
            exit 1
          fi
          echo "✓ Cargo.toml and pyproject.toml versions match: $CARGO_VERSION"

      - name: Validate all language binding versions
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          JS_VERSION=$(node -p "require('./js/package.json').version")
          WASM_VERSION=$(node -p "require('./wasm-pkg/package.json').version")
          CSHARP_VERSION=$(grep '<Version>' csharp/PdfOxide/PdfOxide.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          ERRORS=0
          for LANG_VER in "js/package.json:$JS_VERSION" "wasm-pkg/package.json:$WASM_VERSION" "csharp/PdfOxide.csproj:$CSHARP_VERSION"; do
            FILE=$(echo $LANG_VER | cut -d: -f1)
            VER=$(echo $LANG_VER | cut -d: -f2)
            if [ "$VER" != "$VERSION" ]; then
              echo "Error: $FILE ($VER) does not match Cargo.toml ($VERSION)"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then exit 1; fi
          echo "✓ All language binding versions match: $VERSION"

      - name: Verify release is from main branch
        run: |
          # Fetch main branch
          git fetch origin main
          # Get the commit SHA the tag points to
          TAG_SHA=$(git rev-parse HEAD)
          # Check if this commit is reachable from main
          if ! git merge-base --is-ancestor $TAG_SHA origin/main; then
            echo "Error: Release tags must be created from commits on the main branch"
            echo "Tag SHA: $TAG_SHA"
            echo "Please merge your changes to main first, then create the release tag"
            exit 1
          fi
          echo "✓ Verified: Tag points to a commit on main branch"

  # Build binaries for all platforms
  build-binaries:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (glibc)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: pdf_oxide-linux-x86_64
            use_cross: false

          # Linux x86_64 (musl - static)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: pdf_oxide-linux-x86_64-musl
            use_cross: false

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: pdf_oxide-linux-aarch64
            use_cross: true

          # macOS x86_64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: pdf_oxide-macos-x86_64
            use_cross: false

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: pdf_oxide-macos-aarch64
            use_cross: false

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: pdf_oxide-windows-x86_64
            use_cross: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Install musl tools (Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binaries
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: |
          cargo build --release -p pdf_oxide_cli --target ${{ matrix.target }}
          cargo build --release -p pdf_oxide_mcp --target ${{ matrix.target }}

      - name: Build .deb package (Linux x86_64 glibc)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo install cargo-deb
          cargo deb -p pdf_oxide_cli --no-build --target x86_64-unknown-linux-gnu

      - name: Upload .deb artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: debian-package
          path: target/x86_64-unknown-linux-gnu/debian/*.deb
          retention-days: 7

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          mkdir -p dist
          cd target/${{ matrix.target }}/release
          tar czf ../../../dist/${{ matrix.artifact_name }}-${VERSION}.tar.gz pdf-oxide pdf-oxide-mcp

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ needs.validate.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist
          Set-Location target/${{ matrix.target }}/release
          Compress-Archive -Path @("pdf-oxide.exe", "pdf-oxide-mcp.exe") -DestinationPath ../../../dist/${{ matrix.artifact_name }}-${VERSION}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          retention-days: 7

  # Build WASM package
  build-wasm:
    name: Build WASM
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-wasm-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM binary
        run: cargo build --lib --target wasm32-unknown-unknown --features wasm,rendering --release

      - name: Install matching wasm-bindgen-cli
        run: |
          WASM_BINDGEN_VERSION=$(grep -A1 'name = "wasm-bindgen"' Cargo.lock | grep version | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Installing wasm-bindgen-cli@${WASM_BINDGEN_VERSION}"
          cargo install wasm-bindgen-cli --version "$WASM_BINDGEN_VERSION"

      - name: Generate bindings for bundler, nodejs, and web targets
        # Issue #392: the v0.3.37 artefact shipped a single `--target nodejs`
        # build, which hard-codes `__dirname` and `require('fs')`. That
        # crashes in every browser bundler (Vite, webpack, Rollup, esbuild)
        # and every browser runtime even though the package metadata
        # advertises browser support.
        #
        # Fix: ship all three wasm-bindgen targets side-by-side under
        # `bundler/`, `nodejs/`, and `web/` subdirectories. The top-level
        # package.json routes each consumer to the right one through
        # `exports` conditions (see wasm-pkg/package.json).
        #
        # Nested per-directory package.json files pin the module format so
        # Node unambiguously treats the ESM outputs (bundler/web, which
        # wasm-bindgen emits as ESM) and the CJS output (nodejs, which
        # wasm-bindgen emits as CommonJS) correctly regardless of the
        # top-level `type` setting.
        run: |
          for target in bundler nodejs web; do
            wasm-bindgen --target "$target" --out-dir "wasm-out/$target/" \
              target/wasm32-unknown-unknown/release/pdf_oxide.wasm
          done
          echo '{"type":"module","sideEffects":false}'     > wasm-out/bundler/package.json
          echo '{"type":"commonjs","sideEffects":false}'   > wasm-out/nodejs/package.json
          echo '{"type":"module","sideEffects":false}'     > wasm-out/web/package.json

      - name: Copy package files
        run: |
          cp wasm-pkg/package.json wasm-out/
          cp wasm-pkg/README.md wasm-out/

      - name: Upload WASM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wasm-package
          path: wasm-out/
          retention-days: 7

  # Build native libraries for language bindings (cdylib + staticlib).
  # cdylib (.so/.dylib/.dll): C# (P/Invoke), dynamic-linked Node.js
  # staticlib (.a):           Go CGo (#334), static-linked Node.js (#335)
  #
  # The extra windows-gnu rows cross-compile from Linux via mingw-w64 so we
  # produce a MinGW-compatible `libpdf_oxide.a` that CGo (which uses MinGW
  # gcc by default) can actually link. MSVC's `pdf_oxide.lib` is a COFF
  # archive and isn't link-compatible with MinGW gcc, so those targets stay
  # cdylib-only and feed the C# / dynamic Node.js bindings.
  build-native-libs:
    name: Build native lib (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: native-linux-x86_64
            lib_name: libpdf_oxide.so
            staticlib_name: libpdf_oxide.a
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: native-linux-aarch64
            lib_name: libpdf_oxide.so
            staticlib_name: libpdf_oxide.a
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: native-macos-x86_64
            lib_name: libpdf_oxide.dylib
            staticlib_name: libpdf_oxide.a
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: native-macos-aarch64
            lib_name: libpdf_oxide.dylib
            staticlib_name: libpdf_oxide.a
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: native-windows-x86_64
            lib_name: pdf_oxide.dll
            staticlib_name: pdf_oxide.lib
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: native-windows-aarch64
            lib_name: pdf_oxide.dll
            staticlib_name: pdf_oxide.lib
          # Cross-compiled MinGW build — used only by Go CGo on Windows x64.
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            artifact_name: native-windows-x86_64-gnu
            lib_name: pdf_oxide.dll
            staticlib_name: libpdf_oxide.a
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-native-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: contains(matrix.target, 'aarch64-unknown-linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross-compilation tools (Windows GNU)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build cdylib + staticlib
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ contains(matrix.target, 'aarch64-unknown-linux') && 'aarch64-linux-gnu-gcc' || '' }}
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: ${{ matrix.target == 'x86_64-pc-windows-gnu' && 'x86_64-w64-mingw32-gcc' || '' }}
        run: |
          # Include all optional features that C#/Node.js/Go bindings expose in
          # their public API surface. Without these the shipped libs return
          # _ERR_UNSUPPORTED (8) for rendering, signatures, barcodes, and OCR
          # calls — phantom APIs that compile but always fail at runtime.
          cargo build --release --lib \
            --features rendering,signatures,barcodes,tsa-client,system-fonts \
            --target ${{ matrix.target }}
          mkdir -p native-out
          # Shared library (cdylib) — always present
          cp target/${{ matrix.target }}/release/${{ matrix.lib_name }} native-out/
          # Static library (staticlib) — produced because Cargo.toml lists
          # "staticlib" in crate-type. File name differs between MSVC (.lib)
          # and GNU/Unix (.a).
          cp target/${{ matrix.target }}/release/${{ matrix.staticlib_name }} native-out/
          # Also copy the C header
          cp include/pdf_oxide_c/pdf_oxide.h native-out/
          ls -la native-out/

      # Shrink staticlib: strip .llvmbc (35MB/lib) + DWARF. Consumed by Go CGo
      # and node-gyp, neither of which uses the embedded LLVM bitcode. On MSVC
      # .lib (COFF archive) binutils isn't available, so skip — MSVC output is
      # also substantially smaller to begin with.
      - name: Shrink staticlib
        if: matrix.staticlib_name == 'libpdf_oxide.a'
        shell: bash
        run: |
          bash scripts/shrink-staticlib.sh "native-out/${{ matrix.staticlib_name }}"
          ls -la native-out/

      - name: Upload native lib
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact_name }}
          path: native-out/
          retention-days: 7

  # Package per-platform Go FFI tarballs as GitHub Release assets.
  #
  # v0.3.31 (#TBD) replaces the previous "commit .a files into go/lib/" flow
  # with on-demand download: consumers run
  #   go run github.com/yfedoseev/pdf_oxide/go/cmd/install@v{VERSION}
  # which fetches the matching asset from the release and prints the
  # CGO_CFLAGS / CGO_LDFLAGS to export. This keeps the Go module source-only
  # (~500 KB) and removes ~310 MB of per-release git bloat.
  package-go-ffi:
    name: Package Go FFI release assets
    needs: [validate, build-native-libs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Download all native-lib artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: native-*
          path: native-libs

      - name: Pack per-platform go-ffi tarballs + sha256
        run: |
          set -euxo pipefail
          OUT="go-ffi-out"
          mkdir -p "$OUT"

          pack() {
            local platform="$1" src_artifact="$2" src_lib="$3"
            local tmp="tmp-$platform"
            rm -rf "$tmp"
            mkdir -p "$tmp/lib/$platform" "$tmp/include"

            cp "native-libs/$src_artifact/$src_lib" "$tmp/lib/$platform/libpdf_oxide.a"
            cp include/pdf_oxide_c/pdf_oxide.h "$tmp/include/pdf_oxide.h"

            # Normalise platform name for the asset filename (darwin_arm64 -> darwin-arm64)
            local asset_name="${platform/_/-}"
            local tgz="$OUT/pdf_oxide-go-ffi-$asset_name.tar.gz"
            tar -C "$tmp" -czf "$tgz" lib include

            # sha256 file sits alongside the tarball on the release. The Go
            # installer downloads both and aborts if the hash doesn't match,
            # so a compromised CDN or typo in an asset name fails closed.
            (cd "$OUT" && sha256sum "pdf_oxide-go-ffi-$asset_name.tar.gz" > "pdf_oxide-go-ffi-$asset_name.tar.gz.sha256")
          }

          # pack_shared mirrors pack() but ships the cdylib (.so/.dylib/.dll)
          # for consumption by the purego backend (CGO_ENABLED=0) which
          # dlopens the lib at runtime. Archive filename scheme:
          #   pdf_oxide-go-ffi-shared-<platform>.tar.gz
          pack_shared() {
            local platform="$1" src_artifact="$2" src_lib="$3" dest_lib="$4"
            local tmp="tmp-shared-$platform"
            rm -rf "$tmp"
            mkdir -p "$tmp/lib/$platform" "$tmp/include"

            cp "native-libs/$src_artifact/$src_lib" "$tmp/lib/$platform/$dest_lib"
            cp include/pdf_oxide_c/pdf_oxide.h "$tmp/include/pdf_oxide.h"

            local asset_name="${platform/_/-}"
            local tgz="$OUT/pdf_oxide-go-ffi-shared-$asset_name.tar.gz"
            tar -C "$tmp" -czf "$tgz" lib include

            (cd "$OUT" && sha256sum "pdf_oxide-go-ffi-shared-$asset_name.tar.gz" > "pdf_oxide-go-ffi-shared-$asset_name.tar.gz.sha256")
          }

          pack linux_amd64   native-linux-x86_64       libpdf_oxide.a
          pack linux_arm64   native-linux-aarch64      libpdf_oxide.a
          pack darwin_amd64  native-macos-x86_64       libpdf_oxide.a
          pack darwin_arm64  native-macos-aarch64      libpdf_oxide.a
          # Windows x64: MinGW cross-compiled .a (CGo uses MinGW gcc).
          pack windows_amd64 native-windows-x86_64-gnu libpdf_oxide.a

          # Shared-lib variants for the purego backend.
          pack_shared linux_amd64   native-linux-x86_64  libpdf_oxide.so    libpdf_oxide.so
          pack_shared linux_arm64   native-linux-aarch64 libpdf_oxide.so    libpdf_oxide.so
          pack_shared darwin_amd64  native-macos-x86_64  libpdf_oxide.dylib libpdf_oxide.dylib
          pack_shared darwin_arm64  native-macos-aarch64 libpdf_oxide.dylib libpdf_oxide.dylib
          # Windows MSVC .dll (what the purego backend Dlopen's) — MinGW also
          # produces a .dll but the MSVC build is what consumers expect.
          pack_shared windows_amd64 native-windows-x86_64 pdf_oxide.dll pdf_oxide.dll

          echo "=== Go FFI release assets ==="
          ls -lh "$OUT/"

      - name: Upload go-ffi assets artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: go-ffi-assets
          path: |
            go-ffi-out/*.tar.gz
            go-ffi-out/*.tar.gz.sha256
          retention-days: 7

  # Creates the `go/v<version>` sub-module tag.
  #
  # IMPORTANT: this runs AFTER `create-release` publishes the release with
  # its FFI tarballs attached. If the order were reversed, `go install
  # github.com/.../cmd/install@latest` could briefly resolve the new tag
  # while the installer then 404s fetching the FFI asset. By only tagging
  # once the GitHub Release is up, `@latest` is consistent with reality.
  tag-go-module:
    name: Tag Go module
    needs: [validate, create-release]
    runs-on: ubuntu-latest
    # Restricted to full releases (no `-rc.1`-style prereleases), matching
    # verify-go-install. Tagging a Go module drops the tag on module-proxy /
    # sum.golang.org in minutes, and we don't want RC tags polluting that.
    if: ${{ !contains(needs.validate.outputs.version, '-') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push go/v<version> tag
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --tags origin "go/v${VERSION}" | grep -q .; then
            echo "Tag go/v${VERSION} already exists on remote — skipping"
            exit 0
          fi

          # Tag the commit that validate.yml resolved to — same SHA that
          # produced the release assets, so `go install @v${VERSION}`
          # downloads source that matches the FFI on the release.
          git tag "go/v${VERSION}" "${{ github.sha }}"
          git push origin "go/v${VERSION}"

  # Local path verification that the Go module builds correctly against the
  # freshly-packaged go-ffi asset. Simulates the end-user flow: extract the
  # archive locally, export CGO_CFLAGS/LDFLAGS (as the installer would print),
  # then build a tiny consumer against a `replace`-d local checkout. Uses
  # `replace` so we avoid touching sum.golang.org before the tag propagates.
  verify-go-install:
    name: Verify Go build (${{ matrix.os }})
    needs: [validate, package-go-ffi]
    runs-on: ${{ matrix.os }}
    if: ${{ !contains(needs.validate.outputs.version, '-') }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.22'

      - name: Download go-ffi assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: go-ffi-assets
          path: go-ffi-assets

      - name: Verify checksum + extract FFI asset
        id: extract
        shell: bash
        run: |
          set -euxo pipefail
          # Detect the runner architecture — macos-latest transitioned
          # from x86_64 to arm64 once, and may flip again. Pick the asset
          # at runtime so the verification gate tracks the actual runner.
          arch=$(uname -m)
          case "${{ matrix.os }}-$arch" in
            ubuntu-latest-x86_64)  asset=pdf_oxide-go-ffi-linux-amd64.tar.gz;  goarch_dir=linux_amd64  ;;
            ubuntu-latest-aarch64) asset=pdf_oxide-go-ffi-linux-arm64.tar.gz;  goarch_dir=linux_arm64  ;;
            macos-latest-arm64)    asset=pdf_oxide-go-ffi-darwin-arm64.tar.gz; goarch_dir=darwin_arm64 ;;
            macos-latest-x86_64)   asset=pdf_oxide-go-ffi-darwin-amd64.tar.gz; goarch_dir=darwin_amd64 ;;
            *) echo "unsupported matrix os/arch: ${{ matrix.os }} / $arch" && exit 1 ;;
          esac

          # Checksum gate — this is the same check the Go installer performs
          # at runtime. Guards against truncated CI artifacts and divergence
          # between the .tar.gz and .sha256 we publish.
          (cd go-ffi-assets && shasum -a 256 -c "${asset}.sha256")

          mkdir -p "$HOME/.pdf_oxide/v${{ needs.validate.outputs.version }}"
          tar -C "$HOME/.pdf_oxide/v${{ needs.validate.outputs.version }}" \
              -xzf "go-ffi-assets/$asset"
          echo "install_dir=$HOME/.pdf_oxide/v${{ needs.validate.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "lib_dir=$HOME/.pdf_oxide/v${{ needs.validate.outputs.version }}/lib/$goarch_dir" >> "$GITHUB_OUTPUT"

      - name: Build local consumer with replace directive
        shell: bash
        env:
          CGO_CFLAGS: -I${{ steps.extract.outputs.install_dir }}/include
        run: |
          set -euxo pipefail

          case "${{ matrix.os }}" in
            ubuntu-latest) CGO_LDFLAGS="${{ steps.extract.outputs.lib_dir }}/libpdf_oxide.a -lm -lpthread -ldl -lrt -lgcc_s -lutil -lc" ;;
            macos-latest)  CGO_LDFLAGS="${{ steps.extract.outputs.lib_dir }}/libpdf_oxide.a -framework CoreFoundation -framework Security -framework SystemConfiguration -liconv -lresolv" ;;
          esac
          export CGO_LDFLAGS

          WORK="$(mktemp -d)"
          cd "$WORK"
          go mod init verify
          go mod edit -replace "github.com/yfedoseev/pdf_oxide/go=$GITHUB_WORKSPACE/go"
          go mod edit -require "github.com/yfedoseev/pdf_oxide/go@v0.0.0"
          cat > main.go <<'EOT'
          package main

          import (
            "fmt"
            "os"

            pdfoxide "github.com/yfedoseev/pdf_oxide/go"
          )

          func main() {
            pdf, err := pdfoxide.FromMarkdown("# verify-go-install\n")
            if err != nil { fmt.Println("fromMarkdown:", err); os.Exit(1) }
            defer pdf.Close()
            out := "out.pdf"
            if err := pdf.Save(out); err != nil { fmt.Println("save:", err); os.Exit(1) }

            doc, err := pdfoxide.Open(out)
            if err != nil { fmt.Println("open:", err); os.Exit(1) }
            defer doc.Close()
            n, err := doc.PageCount()
            if err != nil { fmt.Println("pageCount:", err); os.Exit(1) }
            fmt.Printf("ok pages=%d\n", n)
          }
          EOT
          go build -o verify ./...
          # Self-contained binary: no runtime lookup of libpdf_oxide.
          unset LD_LIBRARY_PATH DYLD_LIBRARY_PATH
          ./verify

  # Build Node.js native addon — one .node file per matrix row (#335).
  #
  # Each row downloads the Rust staticlib artifact for its target, stages it
  # at <repo>/lib/ where js/binding.gyp expects it, runs `node-gyp rebuild` to
  # produce a real `pdf_oxide.node` addon. The publish-npm-native job later
  # collects all .node artifacts into js/prebuilds/<triple>/ for bundled
  # distribution.
  build-nodejs:
    name: Build Node.js (${{ matrix.triple }})
    needs: [validate, build-native-libs]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pin to ubuntu-22.04 (glibc 2.35) so the .node prebuild runs on
          # every distro whose glibc is ≥ 2.35 — effectively Debian 12+
          # (bookworm ships 2.36) and Ubuntu 22.04+ (22.04 ships exactly
          # 2.35). Debian 11 / Ubuntu 20.04 / RHEL 8 / RHEL 9 (glibc 2.34)
          # are intentionally NOT supported by this prebuild; users on
          # those baselines should build from source. Combined with the
          # static-libstdc++/static-libgcc flags in binding.gyp, this
          # makes the linux-x64-gnu prebuild self-contained: no system
          # libstdc++ version mismatch (was failing on Debian 12 /
          # GLIBCXX_3.4.30 when built against ubuntu-latest).
          - os: ubuntu-22.04
            triple: linux-x64-gnu
            native_artifact: native-linux-x86_64
          - os: ubuntu-22.04-arm
            triple: linux-arm64-gnu
            native_artifact: native-linux-aarch64
          - os: macos-latest
            triple: darwin-x64
            native_artifact: native-macos-x86_64
          - os: macos-latest
            triple: darwin-arm64
            native_artifact: native-macos-aarch64
          - os: windows-latest
            triple: win32-x64-msvc
            native_artifact: native-windows-x86_64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Download Rust staticlib artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.native_artifact }}
          path: lib/

      - name: Install npm dependencies
        working-directory: js
        shell: bash
        run: npm install --ignore-scripts

      - name: Build native addon with node-gyp
        working-directory: js
        shell: bash
        run: |
          ls -la ../lib/
          npx node-gyp rebuild
          ls -la build/Release/

      # node-gyp links release mode but doesn't strip the final .node. On
      # Linux this was 17 MB shipped; strip takes it to ~12 MB. macOS uses
      # strip -x (keeps global symbols N-API needs). Windows MSVC emits no
      # PDB by default for this target, so nothing to strip.
      - name: Strip .node addon
        if: runner.os != 'Windows'
        working-directory: js
        shell: bash
        run: |
          BEFORE=$(wc -c < build/Release/pdf_oxide.node)
          case "${{ runner.os }}" in
            Linux)  strip --strip-unneeded build/Release/pdf_oxide.node ;;
            macOS)  strip -x build/Release/pdf_oxide.node ;;
          esac
          AFTER=$(wc -c < build/Release/pdf_oxide.node)
          echo "pdf_oxide.node: ${BEFORE} -> ${AFTER} bytes"

      - name: Upload .node artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nodejs-${{ matrix.triple }}
          path: js/build/Release/pdf_oxide.node
          retention-days: 7

  # Build C# NuGet package
  build-csharp:
    name: Build C# NuGet
    needs: [validate, build-native-libs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          # #333 targets net8.0 + net10.0, so both SDKs must be present for
          # `dotnet pack` to emit both TFM outputs.
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Download all native libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: native-*
          path: native-libs

      - name: Stage native libraries for NuGet
        run: |
          # Copy each platform's native lib to the expected target/ paths
          mkdir -p target/release
          mkdir -p target/aarch64-unknown-linux-gnu/release
          mkdir -p target/aarch64-apple-darwin/release
          mkdir -p target/aarch64-pc-windows-msvc/release

          # x64 libraries go to target/release/
          cp native-libs/native-linux-x86_64/libpdf_oxide.so target/release/ 2>/dev/null || true
          cp native-libs/native-macos-x86_64/libpdf_oxide.dylib target/release/ 2>/dev/null || true
          cp native-libs/native-windows-x86_64/pdf_oxide.dll target/release/ 2>/dev/null || true

          # ARM64 libraries go to cross-compilation target paths
          cp native-libs/native-linux-aarch64/libpdf_oxide.so target/aarch64-unknown-linux-gnu/release/ 2>/dev/null || true
          cp native-libs/native-macos-aarch64/libpdf_oxide.dylib target/aarch64-apple-darwin/release/ 2>/dev/null || true
          cp native-libs/native-windows-aarch64/pdf_oxide.dll target/aarch64-pc-windows-msvc/release/ 2>/dev/null || true

          echo "=== Staged native libraries ==="
          find target -name "*.so" -o -name "*.dylib" -o -name "*.dll" | sort

      - name: Build NuGet package
        working-directory: csharp/PdfOxide
        run: |
          dotnet pack -c Release -o ../../nuget-out /p:Version=${{ needs.validate.outputs.version }}

      - name: Verify NativeAOT publish (#333)
        working-directory: csharp/PdfOxide
        shell: bash
        run: |
          set -euxo pipefail
          # Prove the binding is AOT-safe: publish a tiny consumer with
          # PublishAot=true on net10.0 and make sure the trim/AOT analyzer
          # surfaces no warnings. If LibraryImport regresses, this step
          # fails with IL2026 / IL3050 / SYSLIB10xx diagnostics instead of
          # a silent runtime crash in an end-user's published binary.
          #
          # AotSmoke lives in a throw-away $TMPDIR directory so the SDK's
          # default `<Compile Include="**/*.cs">` wildcard can't walk back
          # into csharp/PdfOxide/ and duplicate every type. Earlier the
          # step placed a `PdfOxide.link` symlink inside the temp project
          # as a "ProjectReference fallback", and the wildcard pulled every
          # .cs file from the main library in through the link — producing
          # ~80 CS0436 / CS0579 errors. The absolute-path ProjectReference
          # below needs no symlink at all.
          #
          # AllowUnsafeBlocks is mandatory: LibraryImport's source generator
          # emits `fixed byte*` pinning for every `string` parameter in the
          # generated P/Invoke stub, which requires unsafe codegen even
          # though no user-visible unsafe code is involved (SYSLIB1062).
          PDF_OXIDE_PROJ="$PWD/PdfOxide.csproj"
          PDF_OXIDE_SO="$(realpath "$PWD/../../target/release/libpdf_oxide.so")"
          AOT_DIR="$(mktemp -d)"
          mkdir -p "$AOT_DIR/AotSmoke"
          cat > "$AOT_DIR/AotSmoke/AotSmoke.csproj" <<EOT
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net10.0</TargetFramework>
              <Nullable>enable</Nullable>
              <AllowUnsafeBlocks>true</AllowUnsafeBlocks>
              <PublishAot>true</PublishAot>
              <InvariantGlobalization>true</InvariantGlobalization>
              <TreatWarningsAsErrors>true</TreatWarningsAsErrors>
            </PropertyGroup>
            <ItemGroup>
              <ProjectReference Include="${PDF_OXIDE_PROJ}" />
            </ItemGroup>
          </Project>
          EOT
          cat > "$AOT_DIR/AotSmoke/Program.cs" <<'EOT'
          using PdfOxide.Core;

          using var pdf = Pdf.FromMarkdown("# verify-csharp-aot\n\nbody text.");
          var outPath = System.IO.Path.Combine(System.IO.Path.GetTempPath(), "verify-aot.pdf");
          pdf.Save(outPath);
          using var doc = PdfDocument.Open(outPath);
          System.Console.WriteLine($"ok pages={doc.PageCount}");
          EOT
          dotnet publish "$AOT_DIR/AotSmoke/AotSmoke.csproj" \
            -c Release -r linux-x64 -o "$AOT_DIR/out"
          # C# still uses dynamic P/Invoke against libpdf_oxide.so at
          # runtime (the staticlib path from #334 is Go-only), so stage
          # the Linux cdylib next to the AOT binary before we execute it.
          cp "$PDF_OXIDE_SO" "$AOT_DIR/out/"
          # Run the AOT-compiled binary — no .NET runtime required.
          env -i PATH=/usr/bin:/bin "$AOT_DIR/out/AotSmoke" \
            || { echo "AOT smoke test failed"; exit 1; }

      - name: Upload NuGet package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nuget-package
          path: nuget-out/*.nupkg
          retention-days: 7

  # Generate Python type stubs (runs once on a supported platform)
  generate-python-stubs:
    name: Generate Python type stubs
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Generate type stubs
        run: uvx rylai -o python/pdf_oxide/

      - name: Upload type stubs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-type-stubs
          path: python/pdf_oxide/*.pyi
          retention-days: 7

  # Build Python wheels
  build-python-wheels:
    name: Build Python wheels (${{ matrix.target }})
    needs: [validate, generate-python-stubs]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (glibc)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: wheels-linux-x86_64

          # Linux ARM64 (glibc)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: wheels-linux-aarch64

          # macOS x86_64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: wheels-macos-x86_64

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: wheels-macos-aarch64

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: wheels-windows-x86_64

          # Windows ARM64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: wheels-windows-aarch64

    steps:
      - name: Free disk space (Ubuntu)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install maturin
        run: uv pip install --system maturin

      - name: Install Linux cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Download type stubs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-type-stubs
          path: python/pdf_oxide/

      # Linux glibc wheels build inside the manylinux_2_28 container so the
      # produced .whl is tagged manylinux_2_28 (glibc ≥ 2.28). This covers
      # AL2023 / AWS Lambda Python (glibc 2.34), RHEL 8, Ubuntu 20.04,
      # Debian 11. Building directly on ubuntu-latest tags wheels with the
      # runner's glibc (2_35+) and locks those distros out — see PR #463
      # comment thread on 0.3.42/0.3.43 install failure on Lambda Python.
      - name: Build wheels (linux glibc — manylinux_2_28)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          manylinux: '2_28'
          args: --release --features python --out dist

      - name: Build wheels (macOS / Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: maturin build --release --features python --target ${{ matrix.target }} --out dist

      - name: Verify manylinux_2_28 tag
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          if ! ls dist/*manylinux_2_28*.whl >/dev/null 2>&1; then
            echo "::error::Expected a manylinux_2_28 wheel for ${{ matrix.target }} but found:"
            ls -la dist/
            exit 1
          fi
          echo "manylinux_2_28 wheel produced:"
          ls dist/*manylinux_2_28*.whl

      - name: Build sdist
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: maturin sdist --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          retention-days: 7

  # Build Python wheels for musl targets (Docker-based via maturin-action)
  build-python-wheels-musl:
    name: Build Python wheels (linux ${{ matrix.target }} musllinux)
    needs: [validate, generate-python-stubs]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Download type stubs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-type-stubs
          path: python/pdf_oxide/

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          manylinux: musllinux_1_2
          args: --release --features python --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-linux-${{ matrix.target }}-musl
          path: dist/*
          retention-days: 7

  # Create GitHub Release
  create-release:
    name: Create GitHub Release
    # verify-go-install gates the Go flow end-to-end (checksum match,
    # CGO_LDFLAGS recipe, FromMarkdown→Save→Open→PageCount) before we ever
    # publish the release, so a broken .a or a stale cgo_dev.go can't leak
    # into a tagged release. For prereleases (`-rc.1` etc.) verify-go-install
    # is skipped; `always() && result != failure` lets the release proceed.
    needs: [validate, build-binaries, build-python-wheels, build-python-wheels-musl, build-wasm, build-nodejs, build-csharp, package-go-ffi, verify-go-install]
    if: ${{ always() && needs.verify-go-install.result != 'failure' && needs.package-go-ffi.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Organize release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.tar.gz.sha256" -o -name "*.zip" -o -name "*.whl" -o -name "*.deb" -o -name "*.nupkg" \) -exec cp {} release-files/ \;
          echo "=== Release files ==="
          ls -lh release-files/

      - name: Extract release notes from CHANGELOG
        run: |
          chmod +x .github/scripts/extract-release-notes.sh
          .github/scripts/extract-release-notes.sh "${{ needs.validate.outputs.version }}"

      - name: Read release title
        id: title
        run: echo "title=$(cat release-title.txt)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.title.outputs.title }}
          body_path: release-notes.md
          files: release-files/*
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.version, '-') }}
          fail_on_unmatched_files: false

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: cargo-cyclonedx

      - name: Generate SBOM
        run: cargo cyclonedx --format json --spec-version 1.5 --override-filename sbom.cdx

      - name: Upload SBOM to release
        run: gh release upload "${{ github.ref_name }}" sbom.cdx.json
        env:
          GH_TOKEN: ${{ github.token }}

  # Publish to crates.io (optional)
  publish-crates:
    name: Publish to crates.io
    needs: [validate, create-release]
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.validate.outputs.version, '-') }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Verify crates.io readiness
        run: cargo publish -p pdf_oxide --dry-run

      - name: Publish to crates.io
        run: cargo publish -p pdf_oxide
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

      - name: Publish CLI to crates.io
        run: cargo publish -p pdf_oxide_cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

      - name: Publish MCP server to crates.io
        run: cargo publish -p pdf_oxide_mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

  # Publish to PyPI (optional)
  publish-pypi:
    name: Publish to PyPI
    needs: [validate, build-python-wheels, create-release]
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.validate.outputs.version, '-') }}
    permissions:
      contents: read
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: wheels
          pattern: wheels-*
          merge-multiple: true

      - name: List wheels
        run: |
          echo "=== Wheels to publish ==="
          ls -lh wheels/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: wheels/
          skip-existing: true

  # Publish to npm
  publish-npm:
    name: Publish to npm
    needs: [validate, build-wasm, create-release]
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.validate.outputs.version, '-') }}
    permissions:
      contents: read
    steps:
      - name: Download WASM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wasm-package
          path: wasm-out

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: List package contents
        run: |
          echo "=== WASM package contents ==="
          ls -lh wasm-out/

      - name: Publish to npm
        working-directory: wasm-out
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Publish Homebrew formula and Scoop manifest
  publish-packaging:
    name: Publish Homebrew & Scoop
    needs: [validate, create-release]
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.validate.outputs.version, '-') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Download release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          mkdir -p release-archives
          cd release-archives
          gh release download "v${VERSION}" \
            --pattern "pdf_oxide-macos-aarch64-${VERSION}.tar.gz" \
            --pattern "pdf_oxide-macos-x86_64-${VERSION}.tar.gz" \
            --pattern "pdf_oxide-linux-x86_64-musl-${VERSION}.tar.gz" \
            --pattern "pdf_oxide-windows-x86_64-${VERSION}.zip"

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          cd release-archives
          echo "macos_arm=$(sha256sum pdf_oxide-macos-aarch64-${VERSION}.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "macos_x86=$(sha256sum pdf_oxide-macos-x86_64-${VERSION}.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_x86=$(sha256sum pdf_oxide-linux-x86_64-musl-${VERSION}.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "windows=$(sha256sum pdf_oxide-windows-x86_64-${VERSION}.zip | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Generate Homebrew formula
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          sed \
            -e "s/{{VERSION}}/${VERSION}/g" \
            -e "s/{{SHA256_MACOS_ARM}}/${{ steps.hashes.outputs.macos_arm }}/g" \
            -e "s/{{SHA256_MACOS_X86}}/${{ steps.hashes.outputs.macos_x86 }}/g" \
            -e "s/{{SHA256_LINUX_X86}}/${{ steps.hashes.outputs.linux_x86 }}/g" \
            .github/templates/pdf-oxide.rb > pdf-oxide.rb
          echo "=== Generated Homebrew formula ==="
          cat pdf-oxide.rb

      - name: Generate Scoop manifest
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          sed \
            -e "s/{{VERSION}}/${VERSION}/g" \
            -e "s/{{SHA256_WINDOWS}}/${{ steps.hashes.outputs.windows }}/g" \
            .github/templates/pdf-oxide.json > pdf-oxide.json
          echo "=== Generated Scoop manifest ==="
          cat pdf-oxide.json

      - name: Upload packaging artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: packaging-manifests
          path: |
            pdf-oxide.rb
            pdf-oxide.json
          retention-days: 90

      - name: Push to Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yfedoseev/homebrew-tap.git" tap-repo
          cp pdf-oxide.rb tap-repo/Formula/pdf-oxide.rb
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pdf-oxide.rb
          git commit -m "Update pdf-oxide to ${{ needs.validate.outputs.version }}"
          git push

      - name: Push Scoop manifest
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yfedoseev/scoop-pdf-oxide.git" scoop-repo
          cp pdf-oxide.json scoop-repo/pdf-oxide.json
          cd scoop-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdf-oxide.json
          git commit -m "Update pdf-oxide to ${{ needs.validate.outputs.version }}"
          git push

  # Publish the main `pdf-oxide` package with bundled prebuilds.
  # All per-platform .node files are collected from the build-nodejs matrix
  # and placed under js/prebuilds/<triple>/pdf_oxide.node. The published
  # tarball ships compiled lib/, prebuilds/, and README — no C++ source, no
  # binding.gyp, no install-time build hook. `npm publish` invokes the
  # `prepack` script which runs `tsc` + the ESM-import fixer.
  publish-npm-native:
    name: Publish to npm (pdf-oxide)
    needs: [validate, build-nodejs, create-release]
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.validate.outputs.version, '-') }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all nodejs artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: nodejs-*
          path: nodejs-artifacts

      - name: Collect prebuilds
        shell: bash
        run: |
          set -euxo pipefail
          # Map triple names to prebuild directory names
          declare -A TRIPLE_TO_DIR=(
            [linux-x64-gnu]=linux-x64
            [linux-arm64-gnu]=linux-arm64
            [darwin-x64]=darwin-x64
            [darwin-arm64]=darwin-arm64
            [win32-x64-msvc]=win32-x64
          )
          for triple_dir in nodejs-artifacts/nodejs-*/; do
            triple=$(basename "$triple_dir" | sed 's/^nodejs-//')
            dest_dir="${TRIPLE_TO_DIR[$triple]}"
            if [ -z "$dest_dir" ]; then
              echo "Warning: unknown triple $triple, skipping"
              continue
            fi
            mkdir -p "js/prebuilds/${dest_dir}"
            cp "$triple_dir/pdf_oxide.node" "js/prebuilds/${dest_dir}/pdf_oxide.node"
          done
          echo "=== Prebuilds ==="
          find js/prebuilds -type f | sort

      - name: Install devDependencies (TypeScript etc.)
        working-directory: js
        run: npm install --ignore-scripts

      - name: Publish to npm
        working-directory: js
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Publish C# NuGet package
  publish-nuget:
    name: Publish to NuGet
    needs: [validate, build-csharp, create-release]
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.validate.outputs.version, '-') }}
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Download NuGet package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-package
          path: nuget-out

      - name: Publish to NuGet
        run: |
          dotnet nuget push nuget-out/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

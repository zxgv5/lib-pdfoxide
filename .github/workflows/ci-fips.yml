name: FIPS CryptoProvider CI

# Validates that the --features fips build compiles and smoke-tests
# cleanly on every target platform.  Runs on PRs so regressions are
# caught before a release tag is pushed.  No artifacts are published.

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - 'java/**'
      - 'pdf_oxide_jni/**'
      - '.github/workflows/ci-fips.yml'
      - '.github/workflows/release-fips.yml'
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - 'java/**'
      - 'pdf_oxide_jni/**'
      - '.github/workflows/ci-fips.yml'
      - '.github/workflows/release-fips.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ─── Rust lib: compile + test with --features fips ─────────────────
  fips-lib:
    name: Rust lib (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get -o Acquire::Retries=3 update && sudo apt-get -o Acquire::Retries=3 install -y cmake nasm golang-go

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        # Retry: Homebrew on hosted macOS runners intermittently fails the
        # formula download on transient DNS/network blips.
        run: |
          n=0
          until brew install cmake nasm go; do
            n=$((n + 1))
            [ "$n" -ge 3 ] && { echo "brew install failed after $n attempts"; exit 1; }
            echo "brew install failed (attempt $n/3), retrying in 15s..."
            sleep 15
          done

      - name: Install build deps (Windows)
        if: runner.os == 'Windows'
        run: choco install nasm -y

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          cache: false
          rustflags: ''

      - name: Cache cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-fips-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-fips-cargo-

      - name: Build --no-default-features --features fips,icc
        run: cargo build --no-default-features --features fips,icc

      - name: Test --no-default-features --features fips,icc
        run: cargo test --no-default-features --features fips,icc

      # FIPS-safe example run (cross-OS): the core scenarios use no weak crypto,
      # so they must work under the FIPS build. Demonstrates extraction /
      # conversion / create / search / edit / forms on Linux/macOS/Windows.
      # The FIPS *rejection* path (Standard Security R≤4 needs MD5+RC4 → refused;
      # only AES-256/SHA-2 R=6 is permitted, ISO 32000-1 §7.6) is covered by the
      # `cargo test --features fips,icc` step above (encryption handler unit tests).
      - name: Run FIPS-safe Rust examples (cross-OS, with assertions)
        shell: bash
        run: |
          set -uo pipefail
          PDF=tests/fixtures/simple.pdf
          out_dir="${RUNNER_TEMP:-/tmp}"
          FEAT="--no-default-features --features fips,icc"
          fail() { echo "ASSERT FAILED: $1"; exit 1; }
          run() { # run <expect> -- <cargo-run-args...>
            local expect="$1"; shift; [ "$1" = "--" ] && shift
            echo "::group::$*"
            local out; out="$("$@" 2>&1)" || { echo "$out"; fail "non-zero exit: $*"; }
            echo "$out"
            [ -n "$(printf '%s' "$out" | tr -d '[:space:]')" ] || fail "empty output: $*"
            [ -z "$expect" ] || printf '%s' "$out" | grep -qF "$expect" || fail "missing '$expect': $*"
            echo "::endgroup::"
          }
          run "Pages:" -- cargo run $FEAT --quiet --example tutorial_extract_text -- "$PDF"
          run ""       -- cargo run $FEAT --quiet --example tutorial_convert_formats -- "$PDF"
          run ""       -- cargo run $FEAT --quiet --example tutorial_create_pdf
          run ""       -- cargo run $FEAT --quiet --example tutorial_search_text -- "$PDF" "PDF"
          run ""       -- cargo run $FEAT --quiet --example tutorial_edit_document -- "$PDF" "$out_dir/fips_edited.pdf"
          run ""       -- cargo run $FEAT --quiet --example tutorial_forms_annotations -- "$PDF"

  # ─── Java binding FIPS build (v0.3.53 #NNN). Validates the
  # `pdf_oxide_jni` cdylib compiles under --features fips and that
  # the Java surface still works against a FIPS-compiled native
  # (legacy-crypto excluded; only FIPS-approved algorithms accepted).
  fips-java:
    name: Java FIPS (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # macos-latest deferred for v0.3.53: cargo build emits the
        # dylib at the expected target/release/libpdf_oxide_jni.dylib
        # path (18 MB, executable bit set, verified via `ls -la` in CI)
        # but JDK 11's System.load() raises a bare UnsatisfiedLinkError
        # with no `Caused by:` chain on macos-15 aarch64 runners. The
        # truncated message swallows the underlying dlopen detail, so
        # investigation needs an `otool -L` + `file` + verbose dlopen
        # diagnostic pass — most likely an aws-lc-fips runtime symbol
        # / library dep that resolves on Linux but not on macOS, or a
        # Hardened-Runtime / amfi restriction on hosted-runner kexts.
        # FIPS deployments are predominantly Linux servers so Ubuntu
        # coverage is the actionable target; macos follow-up tracked.
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get -o Acquire::Retries=3 update && sudo apt-get -o Acquire::Retries=3 install -y cmake nasm golang-go

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        # Retry: Homebrew on hosted macOS runners intermittently fails the
        # formula download on transient DNS/network blips.
        run: |
          n=0
          until brew install cmake nasm go; do
            n=$((n + 1))
            [ "$n" -ge 3 ] && { echo "brew install failed after $n attempts"; exit 1; }
            echo "brew install failed (attempt $n/3), retrying in 15s..."
            sleep 15
          done

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          cache: false
          rustflags: ''

      - name: Set up JDK 11
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-fips-java-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-fips-java-

      - name: Cache Maven local repository
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.m2/repository
          key: maven-fips-${{ runner.os }}-${{ hashFiles('java/pom.xml') }}

      - name: Build pdf_oxide_jni --no-default-features --features fips,signatures,rendering,tsa-client
        # FIPS XOR legacy-crypto is enforced at compile-time in
        # pdf_oxide (lib.rs:143's compile_error!) — must use
        # --no-default-features. The `fips` feature propagates
        # to pdf_oxide. `signatures` + `tsa-client` are included
        # because PAdES is the principal FIPS use case. `rendering`
        # is included so JUnit render tests can exercise the surface
        # (FIPS is orthogonal to render — png/raster ops don't
        # touch legacy crypto).
        run: |
          cargo build --release -p pdf_oxide_jni \
            --no-default-features --features fips,signatures,rendering,tsa-client

      - name: Stage FIPS native lib into Maven resources
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)
              DEST="java/src/main/resources/fyi/oxide/pdf/native/Linux/x86_64"
              LIB="libpdf_oxide_jni.so"
              ;;
            macos-latest)
              # macos-latest is aarch64 (Apple Silicon as of 2024+).
              DEST="java/src/main/resources/fyi/oxide/pdf/native/Mac/aarch64"
              LIB="libpdf_oxide_jni.dylib"
              ;;
          esac
          mkdir -p "$DEST"
          cp "target/release/$LIB" "$DEST/"
          ls -la "$DEST"

      - name: mvn test against FIPS native (excluding legacy-crypto tests)
        working-directory: java
        # `-DexcludedGroups=legacy-crypto` excludes the 5 auth tests
        # that exercise R≤4-encrypted PDFs (require MD5 KDF —
        # disabled under FIPS by pdf_oxide's compile-time crypto-
        # policy gate).
        # `-Dfyi.oxide.pdf.lib.path` overrides the pom's hardcoded
        # `.so` path with the OS-correct cdylib extension (the pom
        # default works for local Linux dev but not for macOS CI).
        # Online (no `-o`) — first CI run has no Maven cache.
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest) LIB_EXT=so ;;
            macos-latest)  LIB_EXT=dylib ;;
          esac
          mvn -B -P!dev test \
            -DexcludedGroups=legacy-crypto \
            "-Dfyi.oxide.pdf.lib.path=$GITHUB_WORKSPACE/target/release/libpdf_oxide_jni.$LIB_EXT"

  # ─── Python wheel: build + smoke-test on all four release platforms
  # (linux x86_64, linux aarch64, macOS x86_64, Windows x86_64) using the
  # same manylinux_2_28 + clang setup as release-fips.yml.
  fips-python:
    name: Python wheel FIPS (${{ matrix.label }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux x86_64
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - label: linux aarch64
            runs-on: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - label: macOS x86_64
            runs-on: macos-latest
            target: x86_64-apple-darwin
          # macOS arm64 FIPS wheel deferred (mirrors release-fips.yml): aws-lc-fips
          # links its arm64 dylib against the runner's build SDK (macOS 26) and
          # ignores the deployment target, so delocate rejects any portable wheel
          # tag. FIPS is predominantly Linux/x86_64; tracked as a follow-up.
          - label: windows x86_64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get -o Acquire::Retries=3 update && sudo apt-get -o Acquire::Retries=3 install -y cmake nasm golang-go

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        # Retry: Homebrew on hosted macOS runners intermittently fails the
        # formula download on transient DNS/network blips.
        run: |
          n=0
          until brew install cmake nasm go; do
            n=$((n + 1))
            [ "$n" -ge 3 ] && { echo "brew install failed after $n attempts"; exit 1; }
            echo "brew install failed (attempt $n/3), retrying in 15s..."
            sleep 15
          done

      - name: Install build deps (Windows)
        if: runner.os == 'Windows'
        run: choco install nasm -y

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          cache: false
          rustflags: ''
          target: ${{ matrix.target }}

      - name: Build FIPS wheel (Linux — manylinux_2_28)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          manylinux: '2_28'
          # Same deps + clang override as release-fips.yml: GCC in manylinux_2_28
          # emits .data.rel.ro.local sections that the AWS-LC FIPS delocator rejects.
          before-script-linux: |
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y nasm golang clang || (dnf install -y epel-release && dnf install -y nasm golang clang)
            else
              yum install -y nasm golang clang || (yum install -y epel-release && yum install -y nasm golang clang)
            fi
            export CC=clang CXX=clang++
          args: --release --target ${{ matrix.target }} --no-default-features --features python,fips,icc --out dist

      - name: Build FIPS wheel (macOS / Windows)
        if: runner.os != 'Linux'
        shell: bash
        # Mirror release-fips.yml: pin the x86_64 macOS wheel to the portable
        # 11.0 floor. (macOS arm64 is deferred — see the matrix note.)
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        run: |
          uv tool install maturin
          # delocate/delvewheel bundle the aws-lc-fips shared library into the
          # wheel so it is self-contained (aws-lc-fips-sys builds a .dylib on
          # macOS and a .dll on Windows rather than a static archive).
          if [ "$RUNNER_OS" = "macOS" ]; then pip install delocate; fi
          if [ "$RUNNER_OS" = "Windows" ]; then pip install delvewheel; fi
          maturin build --release \
            --target ${{ matrix.target }} \
            --no-default-features --features python,fips,icc \
            --out dist
          if [ "$RUNNER_OS" = "macOS" ]; then
            # DYLD_LIBRARY_PATH lets delocate resolve the @rpath reference to
            # libaws_lc_fips_*_crypto.dylib which lives in the cargo build dir.
            FIPS_LIB_DIR=$(find target -name "libaws_lc_fips_*_crypto.dylib" -exec dirname {} \; 2>/dev/null | head -1)
            DYLD_LIBRARY_PATH="${FIPS_LIB_DIR}${DYLD_LIBRARY_PATH:+:${DYLD_LIBRARY_PATH}}" delocate-wheel dist/*.whl
          fi
          if [ "$RUNNER_OS" = "Windows" ]; then
            DLL_DIR=$(find target -name "aws_lc_fips_*_crypto.dll" -exec dirname {} \; 2>/dev/null | head -1)
            [ -n "$DLL_DIR" ] && delvewheel repair dist/*.whl --add-path "$DLL_DIR" --wheel-dir dist
          fi

      - name: Smoke-test wheel
        if: |
          (matrix.target == 'x86_64-unknown-linux-gnu' && runner.os == 'Linux' && runner.arch == 'X64') ||
          (matrix.target == 'aarch64-unknown-linux-gnu' && runner.os == 'Linux' && runner.arch == 'ARM64') ||
          (matrix.target == 'x86_64-pc-windows-msvc' && runner.os == 'Windows')
        shell: bash
        run: |
          uv venv
          uv pip install dist/*.whl
          uv run --no-sync python -c "import pdf_oxide; pre=pdf_oxide.crypto_active_provider(); assert pre=='rust-crypto (default, lazy)',pre; providers=pdf_oxide.crypto_available_providers(); assert 'aws-lc-rs' in providers,providers; pdf_oxide.crypto_use_fips(); assert pdf_oxide.crypto_active_provider()=='aws-lc-rs'; print('FIPS smoke test passed:',providers)"

name: Elixir Bindings CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'elixir/**'
      - 'src/**'
      - 'include/pdf_oxide_c/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/elixir.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'elixir/**'
      - 'src/**'
      - 'include/pdf_oxide_c/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/elixir.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PDF_OXIDE_INCLUDE_DIR: ${{ github.workspace }}/include
  PDF_OXIDE_LIB_DIR: ${{ github.workspace }}/target/release

jobs:
  test:
    name: Elixir on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-15 (not macos-latest): the macos-latest image advanced to
        # macos26, which erlef/setup-beam can't map yet ("failed to map a
        # target OS from ImageOS 'macos26'"). Pin to a supported image.
        os: [ubuntu-latest, macos-15]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          cache: false
          rustflags: ''

      - name: Cache Cargo build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-release-

      - name: Build cdylib (release, shipped binding feature set)
        run: cargo build --release --lib --features ocr,rendering,signatures,barcodes,tsa-client,system-fonts

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@e6d7c94229049569db56a7ad5a540c051a010af9 # v1
        with:
          otp-version: '27'
          elixir-version: '1.17'

      - name: Deps + compile (builds NIF via elixir_make, warnings as errors)
        working-directory: elixir
        run: |
          mix deps.get
          mix compile --warnings-as-errors

      - name: Format check (mix format)
        working-directory: elixir
        run: mix format --check-formatted

      - name: Lint (Credo)
        working-directory: elixir
        run: mix credo --strict

      - name: Static analysis (Dialyzer)
        working-directory: elixir
        run: mix dialyzer

      - name: Test (api-coverage)
        working-directory: elixir
        shell: bash
        run: |
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          mix test

      - name: Run example (basic_extraction, with assertion)
        working-directory: elixir
        shell: bash
        run: |
          set -uo pipefail
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          OUT="$(mix run examples/basic_extraction.exs)"
          echo "$OUT"
          echo "$OUT" | grep -q "Hello pdf_oxide" || { echo "::error::example output missing expected text"; exit 1; }

      - name: Run example (html_extraction, with assertion)
        working-directory: elixir
        shell: bash
        run: |
          set -uo pipefail
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          OUT="$(mix run examples/html_extraction.exs)"
          echo "$OUT"
          echo "$OUT" | grep -q "HTML OK" || { echo "::error::html_extraction example did not pass"; exit 1; }

      - name: Run example (words_geometry, with assertion)
        working-directory: elixir
        shell: bash
        run: |
          set -uo pipefail
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          OUT="$(mix run examples/words_geometry.exs)"
          echo "$OUT"
          echo "$OUT" | grep -q "WORDS OK" || { echo "::error::words_geometry example did not pass"; exit 1; }

      - name: Run example (tables_extraction, with assertion)
        working-directory: elixir
        shell: bash
        run: |
          set -uo pipefail
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          OUT="$(mix run examples/tables_extraction.exs)"
          echo "$OUT"
          echo "$OUT" | grep -q "TABLES OK" || { echo "::error::tables_extraction example did not pass"; exit 1; }

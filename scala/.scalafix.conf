# scalafix ruleset for the pdf_oxide Scala facade.
#
# DisableSyntax + ProcedureSyntax are purely syntactic and reliable across the
# Scala 3 `extension`/`@main` source here. RemoveUnused is intentionally omitted:
# the facade relies on a wildcard import (scala.jdk.CollectionConverters.*) and
# selective imports that the semantic unused-checker can false-positive on under
# Scala 3 — correctness over strictness (per the binding's "it should just work"
# stance). Re-enable RemoveUnused once the source is verified clean under it.
rules = [
  DisableSyntax
  ProcedureSyntax
]

DisableSyntax.noVars = false
DisableSyntax.noThrows = false
DisableSyntax.noNulls = false
DisableSyntax.noReturns = true
DisableSyntax.noFinalize = true
DisableSyntax.noValInForComprehension = true
DisableSyntax.noUniversalEquality = false

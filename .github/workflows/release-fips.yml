name: Release (FIPS variant)

# FIPS-validated build & publish path (issue #236).
#
# Triggers:
#   pull_request → main  : full build across all platforms and bindings,
#                          no publish. Validates everything before a tag.
#   push tag v*.*.*      : full build + publish to all package indexes.
#   workflow_dispatch    : manual dry-run (publish=false) or forced publish.
#
# Builds `pdf_oxide` with --features fips (AWS-LC FIPS 140-3 module) and
# publishes the resulting artifacts as parallel `_fips` distributions:
#
#   PyPI:  pdf_oxide_fips
#   npm:   pdf-oxide-fips
#   NuGet: PdfOxide.Fips
#   Go:    github.com/yfedoseev/pdf_oxide/go-fips
#
# Single-provider binaries — auditors typically require this. The
# default distributions stay on RustCryptoProvider (no FIPS), built
# by `release.yml`.
#
# Platform matrix (v0.3.44):
#
#   Linux  x86_64  (manylinux_2_28)  ✅
#   Linux  aarch64 (manylinux_2_28)  ✅
#   macOS  x86_64                     ✅
#   macOS  arm64 (Apple Silicon)     ✅
#   Windows x86_64                    ✅
#
# musllinux_1_2 wheels for Python and Linux aarch64 cross-build for
# Go are deferred — the AWS-LC FIPS source needs a specific cmake +
# nasm + perl combination that's most fragile under cross-compilation.

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - 'js/**'
      - 'csharp/**'
      - 'go/**'
      - '.github/workflows/release-fips.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.3.45)'
        required: true
      publish:
        description: 'Publish to package indexes (false = dry-run, build artifacts only)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ─── VALIDATE tag ↔ Cargo.toml version ────────────────────────────
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.version || (github.event_name != 'pull_request' && github.ref_name || github.sha) }}

      - name: Validate tag format
        if: github.event_name != 'pull_request'
        run: |
          TAG="${{ inputs.version || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: ref '$TAG' is not a vX.Y.Z release tag"
            exit 1
          fi

      - name: Validate tag matches Cargo.toml version
        if: github.event_name != 'pull_request'
        run: |
          TAG="${{ inputs.version || github.ref_name }}"
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          EXPECTED_TAG="v$CARGO_VERSION"
          if [ "$TAG" != "$EXPECTED_TAG" ]; then
            echo "Error: tag '$TAG' does not match Cargo.toml version '$CARGO_VERSION' (expected '$EXPECTED_TAG')"
            exit 1
          fi
          echo "✓ tag matches Cargo.toml: $TAG"

      - name: Validate pyproject.toml version matches
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          PY_VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "$PY_VERSION" ]; then
            echo "Error: Cargo.toml ($CARGO_VERSION) and pyproject.toml ($PY_VERSION) versions don't match"
            exit 1
          fi
          echo "✓ pyproject.toml matches: $PY_VERSION"

      - name: Validate js/wasm/csharp versions match
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          JS_VERSION=$(node -p "require('./js/package.json').version")
          WASM_VERSION=$(node -p "require('./wasm-pkg/package.json').version")
          CSHARP_VERSION=$(grep '<Version>' csharp/PdfOxide/PdfOxide.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          ERRORS=0
          for LANG_VER in "js/package.json:$JS_VERSION" "wasm-pkg/package.json:$WASM_VERSION" "csharp/PdfOxide.csproj:$CSHARP_VERSION"; do
            FILE=$(echo $LANG_VER | cut -d: -f1)
            VER=$(echo $LANG_VER | cut -d: -f2)
            if [ "$VER" != "$CARGO_VERSION" ]; then
              echo "Error: $FILE ($VER) does not match Cargo.toml ($CARGO_VERSION)"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then exit 1; fi
          echo "✓ all binding versions match: $CARGO_VERSION"

  # ─── PYTHON wheels ─────────────────────────────────────────────────
  build-fips-python:
    name: Python wheel (${{ matrix.label }})
    needs: [validate]
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux x86_64
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pdf_oxide_fips-python-linux-x86_64
          - label: linux aarch64
            runs-on: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: pdf_oxide_fips-python-linux-aarch64
          - label: macOS x86_64
            runs-on: macos-latest
            target: x86_64-apple-darwin
            artifact: pdf_oxide_fips-python-macos-x86_64
          - label: macOS arm64
            runs-on: macos-latest
            target: aarch64-apple-darwin
            artifact: pdf_oxide_fips-python-macos-arm64
          - label: windows x86_64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pdf_oxide_fips-python-windows-x86_64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.version || (github.event_name != 'pull_request' && github.ref_name || github.sha) }}

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake nasm golang-go

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake nasm go

      - name: Install build deps (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install nasm -y
          # cmake ships with windows-latest runner image already.

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ''
          target: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-fips-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-fips-cargo-

      - name: Patch package name to pdf_oxide_fips (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          sed -i.bak 's/^name = "pdf_oxide"$/name = "pdf_oxide_fips"/' pyproject.toml
          rm pyproject.toml.bak

      - name: Patch package name to pdf_oxide_fips (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          (Get-Content pyproject.toml) -replace '^name = "pdf_oxide"$', 'name = "pdf_oxide_fips"' |
            Set-Content pyproject.toml

      # Linux glibc wheels: build inside manylinux_2_28 container so the
      # tag matches the platform floor advertised in the v0.3.44 release
      # notes (AL2023 / AWS Lambda Python, RHEL 8, Ubuntu 20.04, Debian 11).
      # Building natively on ubuntu-latest tags wheels with the runner's
      # glibc (2_35+) and excludes those distros — same regression that
      # hit the default wheels in 0.3.42/0.3.43.
      - name: Build FIPS wheel (linux glibc — manylinux_2_28)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          manylinux: '2_28'
          # AWS-LC FIPS build needs nasm, cmake, golang (for delocate codegen),
          # and clang.  GCC in manylinux_2_28 emits .data.rel.ro.local sections
          # that the FIPS delocator rejects as a boundary violation; clang avoids
          # this.  cmake is preinstalled in the image; the others are not.
          before-script-linux: |
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y nasm golang clang || (dnf install -y epel-release && dnf install -y nasm golang clang)
            else
              yum install -y nasm golang clang || (yum install -y epel-release && yum install -y nasm golang clang)
            fi
            export CC=clang CXX=clang++
          args: --release --target ${{ matrix.target }} --no-default-features --features python,fips,icc --out dist

      - name: Verify manylinux_2_28 tag
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          if ! ls dist/*manylinux_2_28*.whl >/dev/null 2>&1; then
            echo "::error::Expected a manylinux_2_28 FIPS wheel for ${{ matrix.target }} but found:"
            ls -la dist/
            exit 1
          fi
          echo "manylinux_2_28 FIPS wheel produced:"
          ls dist/*manylinux_2_28*.whl

      - name: Build FIPS wheel (macOS / Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          uv tool install maturin
          # delocate/delvewheel bundle the aws-lc-fips shared library into the
          # wheel so it is self-contained (aws-lc-fips-sys builds a .dylib on
          # macOS and a .dll on Windows rather than a static archive).
          if [ "$RUNNER_OS" = "macOS" ]; then pip install delocate; fi
          if [ "$RUNNER_OS" = "Windows" ]; then pip install delvewheel; fi
          maturin build --release \
            --target ${{ matrix.target }} \
            --no-default-features --features python,fips,icc \
            --out dist
          if [ "$RUNNER_OS" = "macOS" ]; then
            # DYLD_LIBRARY_PATH lets delocate resolve the @rpath reference to
            # libaws_lc_fips_*_crypto.dylib which lives in the cargo build dir.
            FIPS_LIB_DIR=$(find target -name "libaws_lc_fips_*_crypto.dylib" -exec dirname {} \; 2>/dev/null | head -1)
            DYLD_LIBRARY_PATH="${FIPS_LIB_DIR}${DYLD_LIBRARY_PATH:+:${DYLD_LIBRARY_PATH}}" delocate-wheel dist/*.whl
          fi
          if [ "$RUNNER_OS" = "Windows" ]; then
            DLL_DIR=$(find target -name "aws_lc_fips_*_crypto.dll" -exec dirname {} \; 2>/dev/null | head -1)
            [ -n "$DLL_DIR" ] && delvewheel repair dist/*.whl --add-path "$DLL_DIR" --wheel-dir dist
          fi

      - name: Smoke-test wheel
        # Cross-build target wheels can't always run on the host —
        # only smoke-test when the target matches the runner.
        if: |
          (matrix.target == 'x86_64-unknown-linux-gnu' && runner.os == 'Linux' && runner.arch == 'X64') ||
          (matrix.target == 'aarch64-unknown-linux-gnu' && runner.os == 'Linux' && runner.arch == 'ARM64') ||
          (matrix.target == 'x86_64-apple-darwin' && runner.os == 'macOS' && runner.arch == 'X64') ||
          (matrix.target == 'aarch64-apple-darwin' && runner.os == 'macOS' && runner.arch == 'ARM64') ||
          (matrix.target == 'x86_64-pc-windows-msvc' && runner.os == 'Windows')
        shell: bash
        run: |
          uv venv
          uv pip install dist/*.whl
          uv run --no-sync python -c "import pdf_oxide; pre=pdf_oxide.crypto_active_provider(); assert pre=='rust-crypto (default, lazy)',pre; providers=pdf_oxide.crypto_available_providers(); assert 'aws-lc-rs' in providers,providers; pdf_oxide.crypto_use_fips(); assert pdf_oxide.crypto_active_provider()=='aws-lc-rs'; print('FIPS smoke test passed:',providers)"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.whl
          retention-days: 30

  publish-fips-pypi:
    name: Publish pdf_oxide_fips to PyPI
    needs: [build-fips-python]
    runs-on: ubuntu-latest
    if: ${{ inputs.publish == true || github.event_name == 'push' }}
    environment:
      name: pypi-fips
      url: https://pypi.org/p/pdf_oxide_fips
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
          pattern: pdf_oxide_fips-python-*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
          skip-existing: true

  # ─── NPM prebuilds + tarball ───────────────────────────────────────
  build-fips-npm-prebuilds:
    name: npm prebuild (${{ matrix.label }})
    needs: [validate]
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux x64
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            prebuild_dir: linux-x64
            node_arch: x64
          - label: linux arm64
            runs-on: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            prebuild_dir: linux-arm64
            node_arch: arm64
          - label: macOS x64
            runs-on: macos-latest
            target: x86_64-apple-darwin
            prebuild_dir: darwin-x64
            node_arch: x64
          - label: macOS arm64
            runs-on: macos-latest
            target: aarch64-apple-darwin
            prebuild_dir: darwin-arm64
            node_arch: arm64
          - label: windows x64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            prebuild_dir: win32-x64
            node_arch: x64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.version || (github.event_name != 'pull_request' && github.ref_name || github.sha) }}

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake nasm golang-go

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake nasm go

      - name: Install build deps (Windows)
        if: runner.os == 'Windows'
        run: choco install nasm -y

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ''
          target: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-fips-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-fips-cargo-

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Build FIPS Rust libs
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features fips,icc

      - name: Stage staticlib for node-gyp
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p lib
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/pdf_oxide.lib lib/
          else
            cp target/${{ matrix.target }}/release/libpdf_oxide.a lib/
          fi

      - name: Merge aws-lc-fips crypto lib into pdf_oxide.lib (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # aws-lc-fips-sys on Windows compiles a separate crypto static lib.
          # The Rust staticlib references its symbols but does not bundle them.
          # Use lib.exe to merge so node-gyp/MSBuild can resolve them.
          $target = "${{ matrix.target }}"
          $fipsLib = Get-ChildItem -Recurse `
              -Path "target\$target\release\build" `
              -Filter "aws_lc_fips_*_crypto.lib" `
              -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $fipsLib) {
            Write-Host "aws_lc_fips_*_crypto.lib not found under target\$target\release\build; skipping merge"
            exit 0
          }
          Write-Host "Merging FIPS lib: $fipsLib"
          $libExe = Get-ChildItem -Recurse `
              -Path "C:\Program Files\Microsoft Visual Studio" `
              -Filter "lib.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "HostX64\\x64\\lib\.exe" } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $libExe) { Write-Error "lib.exe not found in VS installation"; exit 1 }
          & $libExe /nologo /OUT:lib\pdf_oxide_merged.lib lib\pdf_oxide.lib $fipsLib
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Move-Item -Force lib\pdf_oxide_merged.lib lib\pdf_oxide.lib
          Write-Host "Merged lib size: $((Get-Item lib\pdf_oxide.lib).Length) bytes"

      - name: Install npm dependencies
        working-directory: js
        run: npm install --ignore-scripts

      - name: Build native NAPI addon with node-gyp
        working-directory: js
        shell: bash
        run: npx node-gyp rebuild --arch=${{ matrix.node_arch }}

      - name: Stage prebuild
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p js/prebuilds/${{ matrix.prebuild_dir }}
          cp js/build/Release/pdf_oxide.node \
             js/prebuilds/${{ matrix.prebuild_dir }}/pdf_oxide.node

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdf_oxide_fips-npm-prebuild-${{ matrix.prebuild_dir }}
          path: js/prebuilds/${{ matrix.prebuild_dir }}/
          retention-days: 30

  build-fips-npm-pack:
    name: Pack pdf-oxide-fips tarball
    needs: [build-fips-npm-prebuilds]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.version || (github.event_name != 'pull_request' && github.ref_name || github.sha) }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all prebuilds
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: js/prebuilds-staging
          pattern: pdf_oxide_fips-npm-prebuild-*

      - name: Stage prebuilds into js/prebuilds
        run: |
          set -euo pipefail
          mkdir -p js/prebuilds
          for dir in js/prebuilds-staging/*/; do
            name=$(basename "$dir" | sed 's/^pdf_oxide_fips-npm-prebuild-//')
            mkdir -p "js/prebuilds/$name"
            cp "$dir"/* "js/prebuilds/$name/"
          done
          ls -la js/prebuilds/

      - name: Determine release version
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
            echo "VERSION=v${CARGO_VERSION}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ inputs.version || github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Patch package name + version
        run: |
          cd js
          npm version --no-git-tag-version --allow-same-version "${VERSION#v}"
          node -e "
          const pkg = require('./package.json');
          pkg.name = 'pdf-oxide-fips';
          pkg.description = '[FIPS 140-3 validated build] ' + pkg.description;
          require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build TypeScript
        working-directory: js
        run: |
          npm install --ignore-scripts
          npm run build:ts

      - name: Smoke-test on this runner
        working-directory: js
        run: |
          node -e "
          const oxide = require('./lib/index.js');
          if (typeof oxide.useFipsCryptoProvider !== 'function') throw new Error('useFipsCryptoProvider missing');
          if (!oxide.isFipsCryptoAvailable()) throw new Error('FIPS not available');
          oxide.useFipsCryptoProvider();
          if (oxide.getActiveCryptoProvider() !== 'aws-lc-rs') throw new Error('FIPS provider not active');
          console.log('FIPS npm smoke test passed');
          // The module-level WorkerPool singleton keeps the event loop alive;
          // force-exit so the step completes instead of hanging indefinitely.
          process.exit(0);
          "

      - name: Pack tarball
        working-directory: js
        run: |
          mkdir -p ../dist-npm
          npm pack --pack-destination ../dist-npm

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdf-oxide-fips-npm-tarball
          path: dist-npm/*.tgz
          retention-days: 30

  publish-fips-npm:
    name: Publish pdf-oxide-fips to npm
    needs: [build-fips-npm-pack]
    runs-on: ubuntu-latest
    if: ${{ inputs.publish == true || github.event_name == 'push' }}
    environment:
      name: npm-fips
      url: https://www.npmjs.com/package/pdf-oxide-fips
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pdf-oxide-fips-npm-tarball
          path: dist-npm

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish
        run: npm publish ./dist-npm/*.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── NUGET (multi-RID single package) ──────────────────────────────
  build-fips-nuget-libs:
    name: NuGet runtime ${{ matrix.label }}
    needs: [validate]
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rid: linux-x64
            lib_name: libpdf_oxide.so
          - label: linux-arm64
            runs-on: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            rid: linux-arm64
            lib_name: libpdf_oxide.so
          - label: osx-x64
            runs-on: macos-latest
            target: x86_64-apple-darwin
            rid: osx-x64
            lib_name: libpdf_oxide.dylib
          - label: osx-arm64
            runs-on: macos-latest
            target: aarch64-apple-darwin
            rid: osx-arm64
            lib_name: libpdf_oxide.dylib
          - label: win-x64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            rid: win-x64
            lib_name: pdf_oxide.dll
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.version || (github.event_name != 'pull_request' && github.ref_name || github.sha) }}

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake nasm golang-go

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake nasm go

      - name: Install build deps (Windows)
        if: runner.os == 'Windows'
        run: choco install nasm -y

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ''
          target: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-fips-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-fips-cargo-

      - name: Build cdylib with FIPS feature
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features fips,icc

      - name: Stage RID-specific lib
        shell: bash
        run: |
          mkdir -p staging/runtimes/${{ matrix.rid }}/native
          cp target/${{ matrix.target }}/release/${{ matrix.lib_name }} \
             staging/runtimes/${{ matrix.rid }}/native/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdf_oxide_fips-nuget-runtime-${{ matrix.rid }}
          path: staging/runtimes/${{ matrix.rid }}/
          retention-days: 30

  build-fips-nuget-pack:
    name: Pack PdfOxide.Fips NuGet package
    needs: [build-fips-nuget-libs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.version || (github.event_name != 'pull_request' && github.ref_name || github.sha) }}

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '8.0'

      - name: Download all RID-specific runtimes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: csharp/PdfOxide/runtimes-staging
          pattern: pdf_oxide_fips-nuget-runtime-*

      - name: Stage runtimes/ directory
        run: |
          set -euo pipefail
          mkdir -p csharp/PdfOxide/runtimes
          for dir in csharp/PdfOxide/runtimes-staging/*/; do
            rid=$(basename "$dir" | sed 's/^pdf_oxide_fips-nuget-runtime-//')
            mkdir -p "csharp/PdfOxide/runtimes/$rid/native"
            cp "$dir"/native/* "csharp/PdfOxide/runtimes/$rid/native/"
          done
          ls -laR csharp/PdfOxide/runtimes/

      - name: Patch PackageId to PdfOxide.Fips
        run: |
          cd csharp/PdfOxide
          sed -i 's|<PackageId>PdfOxide</PackageId>|<PackageId>PdfOxide.Fips</PackageId>|' PdfOxide.csproj
          sed -i 's|<Description>|<Description>[FIPS 140-3 validated build] |' PdfOxide.csproj || true

      - name: Determine release version
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
            echo "VERSION=v${CARGO_VERSION}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ inputs.version || github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Pack
        working-directory: csharp/PdfOxide
        run: |
          dotnet pack -c Release \
            -p:Version=${VERSION#v} \
            -p:PackageVersion=${VERSION#v} \
            -o ../../dist-nuget

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: PdfOxide.Fips-nuget
          path: dist-nuget/*.nupkg
          retention-days: 30

  publish-fips-nuget:
    name: Publish PdfOxide.Fips to NuGet
    needs: [build-fips-nuget-pack]
    runs-on: ubuntu-latest
    if: ${{ inputs.publish == true || github.event_name == 'push' }}
    environment:
      name: nuget-fips
      url: https://www.nuget.org/packages/PdfOxide.Fips
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: PdfOxide.Fips-nuget
          path: dist-nuget

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '8.0'

      - name: Push
        run: |
          dotnet nuget push dist-nuget/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  # ─── GO submodule (multi-platform static libs) ─────────────────────
  build-fips-go:
    name: Go static lib (${{ matrix.label }})
    needs: [validate]
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux amd64
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            go_dir: linux_amd64
          - label: linux arm64
            runs-on: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            go_dir: linux_arm64
          - label: darwin amd64
            runs-on: macos-latest
            target: x86_64-apple-darwin
            go_dir: darwin_amd64
          - label: darwin arm64
            runs-on: macos-latest
            target: aarch64-apple-darwin
            go_dir: darwin_arm64
          - label: windows amd64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            go_dir: windows_amd64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.version || (github.event_name != 'pull_request' && github.ref_name || github.sha) }}

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake nasm golang-go

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake nasm go

      - name: Install build deps (Windows)
        if: runner.os == 'Windows'
        run: choco install nasm -y

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ''
          target: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-fips-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-fips-cargo-

      - name: Build static lib with FIPS feature
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features fips,icc

      - name: Stage go-fips lib
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging/${{ matrix.go_dir }}
          # On Windows, MSVC produces pdf_oxide.lib; on Unix, libpdf_oxide.a.
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/pdf_oxide.lib staging/${{ matrix.go_dir }}/
          else
            cp target/${{ matrix.target }}/release/libpdf_oxide.a staging/${{ matrix.go_dir }}/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdf_oxide_fips-go-${{ matrix.go_dir }}
          path: staging/${{ matrix.go_dir }}/
          retention-days: 30

  bundle-fips-go:
    name: Bundle go-fips submodule
    needs: [build-fips-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.version || (github.event_name != 'pull_request' && github.ref_name || github.sha) }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 'stable'

      - name: Download all platform libs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: go-staging
          pattern: pdf_oxide_fips-go-*

      - name: Stage go-fips submodule
        run: |
          set -euo pipefail
          rm -rf go-fips
          cp -r go go-fips
          cd go-fips
          sed -i 's|module github.com/yfedoseev/pdf_oxide/go$|module github.com/yfedoseev/pdf_oxide/go-fips|' go.mod
          # Update all import paths in .go source files to match the renamed module.
          # Anchor the match with a trailing quote so sub-paths (e.g. .../go-fips/...)
          # are not affected.
          find . -name "*.go" -exec sed -i \
            's|"github.com/yfedoseev/pdf_oxide/go"|"github.com/yfedoseev/pdf_oxide/go-fips"|g' {} +
          mkdir -p lib
          for dir in ../go-staging/*/; do
            arch=$(basename "$dir" | sed 's/^pdf_oxide_fips-go-//')
            mkdir -p "lib/$arch"
            cp "$dir"/* "lib/$arch/"
          done
          ls -laR lib/
          # Generate cgo_flags.go so `go vet` (and downstream consumers of the
          # tarball) can find the prebuilt FIPS static libs via SRCDIR-relative
          # paths.  The dev path (cgo_dev.go, gated on pdf_oxide_dev tag) is
          # skipped here via the !pdf_oxide_dev build constraint.
          cat > cgo_flags.go <<'GOFLAG'
          // Code generated by CI (bundle-fips-go). DO NOT EDIT.
          //go:build !pdf_oxide_dev

          package pdfoxide

          /*
          #cgo linux,amd64 LDFLAGS: ${SRCDIR}/lib/linux_amd64/libpdf_oxide.a -lm -lpthread -ldl -lrt -lgcc_s -lutil -lc
          #cgo linux,arm64 LDFLAGS: ${SRCDIR}/lib/linux_arm64/libpdf_oxide.a -lm -lpthread -ldl -lrt -lgcc_s -lutil -lc
          #cgo darwin,amd64 LDFLAGS: ${SRCDIR}/lib/darwin_amd64/libpdf_oxide.a -framework CoreFoundation -framework Security -framework SystemConfiguration -liconv -lresolv
          #cgo darwin,arm64 LDFLAGS: ${SRCDIR}/lib/darwin_arm64/libpdf_oxide.a -framework CoreFoundation -framework Security -framework SystemConfiguration -liconv -lresolv
          #cgo windows,amd64 LDFLAGS: ${SRCDIR}/lib/windows_amd64/pdf_oxide.lib -lws2_32 -luserenv -lbcrypt -ladvapi32 -lcrypt32 -lsynchronization -lntdll -lkernel32 -lntoskrnl -lole32 -lshell32
          */
          import "C"
          GOFLAG
          go vet ./...

      - name: Smoke-test go-fips on this runner
        run: |
          set -euo pipefail
          cd go-fips
          cat > /tmp/fips_smoke.go <<'EOF'
          package main
          import (
            "fmt"
            "log"
            pdf "github.com/yfedoseev/pdf_oxide/go-fips"
          )
          func main() {
            if !pdf.IsFipsCryptoAvailable() {
              log.Fatal("FIPS not available in this build")
            }
            if err := pdf.UseFipsCryptoProvider(); err != nil {
              log.Fatalf("UseFipsCryptoProvider: %v", err)
            }
            if got := pdf.ActiveCryptoProvider(); got != "aws-lc-rs" {
              log.Fatalf("expected aws-lc-rs, got %s", got)
            }
            fmt.Println("FIPS go-fips smoke test passed")
          }
          EOF
          go run /tmp/fips_smoke.go

      - name: Tar go-fips submodule
        run: tar czf pdf_oxide_fips-go-bundle.tar.gz go-fips/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdf_oxide_fips-go-bundle
          path: pdf_oxide_fips-go-bundle.tar.gz
          retention-days: 30

  # No publish job for Go: the Go module index proxies directly off
  # the git tag. After bundle-fips-go succeeds, the maintainer tags
  # the release commit with `go-fips/v0.3.44` (a submodule tag) so
  # `go get github.com/yfedoseev/pdf_oxide/go-fips@v0.3.44` resolves:
  #
  #   git tag -s go-fips/v0.3.44 -m "Go FIPS variant v0.3.44"
  #   git push origin go-fips/v0.3.44
  #
  # Listed here for clarity; not automated to avoid pushing tags
  # from CI without explicit human confirmation.

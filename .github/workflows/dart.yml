name: Dart Bindings CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'dart/**'
      - 'src/**'
      - 'include/pdf_oxide_c/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/dart.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'dart/**'
      - 'src/**'
      - 'include/pdf_oxide_c/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/dart.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PDF_OXIDE_LIB_DIR: ${{ github.workspace }}/target/release

jobs:
  test:
    name: Dart on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Test on current stable and the declared min SDK floor (pubspec ^3.4.0).
        sdk: [stable, '3.4']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          cache: false
          rustflags: ''

      - name: Cache Cargo build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-release-

      - name: Build cdylib (release, shipped binding feature set)
        run: cargo build --release --lib --features ocr,rendering,signatures,barcodes,tsa-client,system-fonts

      - name: Set up Dart
        uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c # v1.7.0
        with:
          sdk: ${{ matrix.sdk }}

      - name: pub get
        working-directory: dart
        run: dart pub get

      - name: Analyze (lint)
        working-directory: dart
        run: dart analyze --fatal-infos lib test example

      - name: Format check
        working-directory: dart
        run: dart format --output=none --set-exit-if-changed lib test example

      - name: Test (api-coverage)
        working-directory: dart
        run: dart test

      - name: Run example (basic_extraction, with assertion)
        working-directory: dart
        shell: bash
        run: |
          set -uo pipefail
          OUT="$(dart run example/basic_extraction.dart)"
          echo "$OUT"
          echo "$OUT" | grep -q "Hello pdf_oxide" || { echo "::error::example output missing expected text"; exit 1; }

      - name: Run example (html_extraction, with assertion)
        working-directory: dart
        shell: bash
        run: |
          set -uo pipefail
          OUT="$(dart run example/html_extraction.dart)"
          echo "$OUT"
          echo "$OUT" | grep -q "HTML OK" || { echo "::error::html_extraction missing 'HTML OK'"; exit 1; }

      - name: Run example (words_geometry, with assertion)
        working-directory: dart
        shell: bash
        run: |
          set -uo pipefail
          OUT="$(dart run example/words_geometry.dart)"
          echo "$OUT"
          echo "$OUT" | grep -q "WORDS OK" || { echo "::error::words_geometry missing 'WORDS OK'"; exit 1; }

      - name: Run example (tables_extraction, with assertion)
        working-directory: dart
        shell: bash
        run: |
          set -uo pipefail
          OUT="$(dart run example/tables_extraction.dart)"
          echo "$OUT"
          echo "$OUT" | grep -q "TABLES OK" || { echo "::error::tables_extraction missing 'TABLES OK'"; exit 1; }

      # pub.dev package score (informational) — stable SDK only.
      - name: pana (package score)
        if: matrix.sdk == 'stable' && matrix.os == 'ubuntu-latest'
        working-directory: dart
        run: |
          dart pub global activate pana
          dart pub global run pana --no-warning --exit-code-threshold 200 . || true

name: Julia Bindings CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'julia/**'
      - 'src/**'
      - 'include/pdf_oxide_c/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/julia.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'julia/**'
      - 'src/**'
      - 'include/pdf_oxide_c/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/julia.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PDF_OXIDE_LIB_DIR: ${{ github.workspace }}/target/release

jobs:
  test:
    name: Julia on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          cache: false
          rustflags: ''

      - name: Cache Cargo build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-release-

      - name: Build cdylib (release, shipped binding feature set)
        run: cargo build --release --lib --features ocr,rendering,signatures,barcodes,tsa-client,system-fonts

      - name: Set up Julia
        uses: julia-actions/setup-julia@5c9647d97b78a5debe5164e9eec09d653d29bd71 # v2
        with:
          version: '1'

      - name: Format check (JuliaFormatter)
        working-directory: julia
        run: |
          julia -e 'using Pkg; Pkg.add("JuliaFormatter")'
          julia -e 'using JuliaFormatter; ok = format("."; overwrite=false); ok || (println("Run JuliaFormatter.format(\".\")"); exit(1))'

      - name: Test (api-coverage)
        working-directory: julia
        shell: bash
        run: |
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.test()'

      - name: Run example (basic_extraction, with assertion)
        working-directory: julia
        shell: bash
        run: |
          set -uo pipefail
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          OUT="$(julia --project=. examples/basic_extraction.jl)"
          echo "$OUT"
          echo "$OUT" | grep -q "Hello pdf_oxide" || { echo "::error::example output missing expected text"; exit 1; }

      - name: Run example (html_extraction, with assertion)
        working-directory: julia
        shell: bash
        run: |
          set -uo pipefail
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          OUT="$(julia --project=. examples/html_extraction.jl)"
          echo "$OUT"
          echo "$OUT" | grep -q "HTML OK" || { echo "::error::html_extraction example did not pass"; exit 1; }

      - name: Run example (words_geometry, with assertion)
        working-directory: julia
        shell: bash
        run: |
          set -uo pipefail
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          OUT="$(julia --project=. examples/words_geometry.jl)"
          echo "$OUT"
          echo "$OUT" | grep -q "WORDS OK" || { echo "::error::words_geometry example did not pass"; exit 1; }

      - name: Run example (tables_extraction, with assertion)
        working-directory: julia
        shell: bash
        run: |
          set -uo pipefail
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          OUT="$(julia --project=. examples/tables_extraction.jl)"
          echo "$OUT"
          echo "$OUT" | grep -q "TABLES OK" || { echo "::error::tables_extraction example did not pass"; exit 1; }

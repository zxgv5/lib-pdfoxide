name: Zig Bindings CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'zig/**'
      - 'src/**'
      - 'include/pdf_oxide_c/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/zig.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'zig/**'
      - 'src/**'
      - 'include/pdf_oxide_c/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/zig.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PDF_OXIDE_INCLUDE_DIR: ${{ github.workspace }}/include
  PDF_OXIDE_LIB_DIR: ${{ github.workspace }}/target/release

jobs:
  test:
    name: Zig on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-15 (not macos-latest): the macos-latest image advanced to
        # macos26, whose SDK the pinned Zig 0.15.1 build runner fails to link
        # against (undefined libSystem symbols in zig's own build_zcu.o).
        os: [ubuntu-latest, macos-15]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          cache: false
          rustflags: ''

      - name: Cache Cargo build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-release-

      - name: Build cdylib (release, shipped binding feature set)
        run: cargo build --release --lib --features ocr,rendering,signatures,barcodes,tsa-client,system-fonts

      - name: Set up Zig (pinned — pre-1.0 API drift)
        uses: mlugg/setup-zig@8d6198c65fb0feaa111df26e6b467fea8345e46f # v2
        with:
          version: 0.15.1

      - name: Format check (zig fmt)
        working-directory: zig
        run: zig fmt --check build.zig lib examples

      - name: Test (api-coverage)
        working-directory: zig
        shell: bash
        run: |
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          zig build test -DPDF_OXIDE_INCLUDE_DIR="${PDF_OXIDE_INCLUDE_DIR}" -DPDF_OXIDE_LIB_DIR="${PDF_OXIDE_LIB_DIR}"

      - name: Run example (basic_extraction, with assertion)
        working-directory: zig
        shell: bash
        run: |
          set -uo pipefail
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          OUT="$(zig build example -DPDF_OXIDE_INCLUDE_DIR="${PDF_OXIDE_INCLUDE_DIR}" -DPDF_OXIDE_LIB_DIR="${PDF_OXIDE_LIB_DIR}")"
          echo "$OUT"
          echo "$OUT" | grep -q "Hello pdf_oxide" || { echo "::error::example output missing expected text"; exit 1; }

      - name: Run example (html_extraction, with assertion)
        working-directory: zig
        shell: bash
        run: |
          set -uo pipefail
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          OUT="$(zig build example-html -DPDF_OXIDE_INCLUDE_DIR="${PDF_OXIDE_INCLUDE_DIR}" -DPDF_OXIDE_LIB_DIR="${PDF_OXIDE_LIB_DIR}")"
          echo "$OUT"
          echo "$OUT" | grep -q "HTML OK" || { echo "::error::html_extraction missing 'HTML OK'"; exit 1; }

      - name: Run example (words_geometry, with assertion)
        working-directory: zig
        shell: bash
        run: |
          set -uo pipefail
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          OUT="$(zig build example-words -DPDF_OXIDE_INCLUDE_DIR="${PDF_OXIDE_INCLUDE_DIR}" -DPDF_OXIDE_LIB_DIR="${PDF_OXIDE_LIB_DIR}")"
          echo "$OUT"
          echo "$OUT" | grep -q "WORDS OK" || { echo "::error::words_geometry missing 'WORDS OK'"; exit 1; }

      - name: Run example (tables_extraction, with assertion)
        working-directory: zig
        shell: bash
        run: |
          set -uo pipefail
          export LD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PDF_OXIDE_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          OUT="$(zig build example-tables -DPDF_OXIDE_INCLUDE_DIR="${PDF_OXIDE_INCLUDE_DIR}" -DPDF_OXIDE_LIB_DIR="${PDF_OXIDE_LIB_DIR}")"
          echo "$OUT"
          echo "$OUT" | grep -q "TABLES OK" || { echo "::error::tables_extraction missing 'TABLES OK'"; exit 1; }
